<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Button</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .btn {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.95);
        }

        #red-btn {
            background-color: #ff3333;
        }

        #red-btn:hover {
            background-color: #cc0000;
        }

        #fix-btn {
            background-color: #00cc66;
            margin-top: 20px;
        }

        #fix-btn:hover {
            background-color: #00994c;
        }

        .hidden {
            display: none;
        }

        #message {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin: 20px;
        }

        .hacked-text {
            color: #ff3333;
            animation: blink 1s infinite;
        }

        .fixed-text {
            color: #00cc66;
            animation: spin 1s linear forwards;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(360deg) scale(1.2); }
        }
    </style>
</head>
<body>

    <button id="red-btn" class="btn">Click me</button>
    <div id="message"></div>
    <button id="fix-btn" class="btn hidden">Fix phone</button>

    <script>
        const redBtn = document.getElementById('red-btn');
        const fixBtn = document.getElementById('fix-btn');
        const message = document.getElementById('message');

        redBtn.addEventListener('click', () => {
            redBtn.classList.add('hidden');
            message.innerHTML = `<span class="hacked-text">Boo! You've been hacked... Or have you?</span>`;
            fixBtn.classList.remove('hidden');
        });

        fixBtn.addEventListener('click', () => {
            fixBtn.classList.add('hidden');
            message.innerHTML = `<span class="fixed-text">Phone fixed</span>`;
        });
    </script>

</body>
</html>
